<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LMS My Classroom Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #2481cc;
            --bg: #f0f2f5;
            --text: #2c3e50;
            --success: #27ae60;
            --danger: #e74c3c;
        }

        body {
            font-family: -apple-system, sans-serif;
            background-color: var(--bg);
            margin: 0; padding: 0; color: var(--text);
        }

        /* Sahifalar boshqaruvi */
        .screen { display: none; padding: 20px; }
        .active { display: block; }

        /* Header */
        .header {
            background: white; padding: 15px; text-align: center;
            border-bottom: 2px solid var(--primary); margin-bottom: 10px;
        }
        .header h1 { margin: 0; font-size: 18px; color: var(--primary); text-transform: uppercase; }

        /* Tugmalar */
        .btn-main {
            background: white; border: 1px solid #ccc; width: 100%;
            padding: 15px; border-radius: 10px; font-weight: bold;
            margin-bottom: 10px; display: flex; justify-content: center; align-items: center;
        }
        .btn-add { border: 2px dashed var(--primary); color: var(--primary); }

        /* Modal (Kitob qo'shish oynasi - 2 rasm) */
        #add-book-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center;
        }
        .modal-content {
            background: white; padding: 30px; border-radius: 20px; width: 80%;
            text-align: center; border: 3px solid var(--text);
        }
        .input-box {
            display: flex; gap: 10px; margin-bottom: 20px; align-items: center;
        }
        .label-blue { background: #3498db; color: white; padding: 5px 15px; border-radius: 5px; }
        input { flex: 1; padding: 8px; border: 1px solid #ccc; background: #fffde7; }
        .modal-btns { display: flex; justify-content: space-between; }
        .btn-save { background: var(--success); color: white; border: none; padding: 10px 25px; border-radius: 5px; }
        .btn-cancel { background: var(--danger); color: white; border: none; padding: 10px 25px; border-radius: 5px; }

        /* Unitlar dizayni (4 va 5 rasm) */
        .unit-card {
            background: white; border: 1px solid #ddd; padding: 10px 15px;
            border-radius: 5px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center;
        }
        .status-free { color: #555; font-weight: bold; border: 1px solid #555; padding: 2px 10px; border-radius: 5px; }
        .status-lock { color: var(--danger); font-weight: bold; border: 1px solid var(--danger); padding: 2px 10px; border-radius: 5px; }

        /* Footer tugmalari */
        .footer-btns {
            position: fixed; bottom: 0; left: 0; width: 100%;
            display: flex; background: #ddd; height: 60px;
        }
        .footer-btn {
            flex: 1; display: flex; align-items: center; justify-content: center;
            font-weight: bold; border: 1px solid #bbb; text-transform: uppercase;
        }

        .switch-mode { position: fixed; top: 10px; right: 10px; z-index: 1000; font-size: 10px; }
        .back-home-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .btn-small { border: 2px solid black; padding: 2px 10px; font-size: 12px; font-weight: bold; }
    </style>
</head>
<body>

    <button class="switch-mode" onclick="toggleMode()">🔄 Admin/User</button>

    <div id="admin-home" class="screen">
        <div class="header"><h1>MENING DARSXONAM</h1></div>
        <button class="btn-main btn-add" onclick="showModal()">+Add book</button>
        <div id="admin-books-list">
            <button class="btn-main" onclick="showAdminUnits('Cambridge IELTS')">Cambridge IELTS</button>
        </div>
    </div>

    <div id="add-book-modal">
        <div class="modal-content">
            <div class="header"><h1>MENING DARSXONAM</h1></div>
            <div class="input-box">
                <span class="label-blue">name</span>
                <input type="text" id="new-book-name" placeholder="IELTS CAMBRIDGE">
            </div>
            <div class="modal-btns">
                <button class="btn-cancel" onclick="hideModal()">Cancel</button>
                <button class="btn-save" onclick="saveBook()">Save</button>
            </div>
        </div>
    </div>

    <div id="admin-units" class="screen">
        <div class="header"><h1 id="admin-unit-title">Cambridge IELTS</h1></div>
        <button class="btn-main btn-add">+Add unit</button>
        <div class="back-home-header">
            <button class="btn-small" onclick="showScreen('admin-home')">back</button>
            <div style="border: 2px solid black; padding: 10px 40px; font-weight: bold;">Unit 1</div>
            <button class="btn-small" onclick="showScreen('admin-home')">Home</button>
        </div>
    </div>

    <div id="user-home" class="screen active">
        <div class="header"><h1>MY CLASSROOM</h1></div>
        <div id="user-books-list">
            <button class="btn-main" onclick="showUserUnits('Cambridge IELTS')">Cambridge IELTS</button>
            <button class="btn-main">Essential words 4000</button>
            <button class="btn-main">Read and Understand</button>
        </div>
    </div>

    <div id="user-units" class="screen">
        <div class="header"><h1 id="user-unit-title">Cambridge IELTS</h1></div>
        <div class="back-home-header">
            <button class="btn-small" onclick="showScreen('user-home')">back</button>
        </div>
        
        <div class="unit-card"><span>unit 1</span> <span class="status-free">bepul</span></div>
        <div class="unit-card"><span>unit 2</span> <span class="status-lock">lock</span></div>
        <div class="unit-card"><span>unit 3</span> <span class="status-lock">lock</span></div>
        <div class="unit-card"><span>unit 4</span> <span class="status-lock">lock</span></div>

        <div class="footer-btns">
            <div class="footer-btn" onclick="showScreen('user-home')">HOME</div>
            <div class="footer-btn" style="background: white;">PAYMENT</div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        // Modal funksiyalari
        function showModal() { document.getElementById('add-book-modal').style.display = 'flex'; }
        function hideModal() { document.getElementById('add-book-modal').style.display = 'none'; }

        function saveBook() {
            const name = document.getElementById('new-book-name').value;
            if (name) {
                // Admin ro'yxatiga qo'shish
                const list = document.getElementById('admin-books-list');
                const btn = document.createElement('button');
                btn.className = 'btn-main';
                btn.innerText = name;
                btn.onclick = () => showAdminUnits(name);
                list.appendChild(btn);
                
                hideModal();
                document.getElementById('new-book-name').value = '';
            }
        }

        // Unitlarni ko'rsatish
        function showAdminUnits(name) {
            document.getElementById('admin-unit-title').innerText = name;
            showScreen('admin-units');
        }

        function showUserUnits(name) {
            document.getElementById('user-unit-title').innerText = name;
            showScreen('user-units');
        }

        // Admin/User rejimini almashtirish (Test uchun)
        let mode = 'user';
        function toggleMode() {
            if (mode === 'user') {
                mode = 'admin';
                showScreen('admin-home');
            } else {
                mode = 'user';
                showScreen('user-home');
            }
        }
    </script>
</body>
</html>
